<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowState DevTools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1b26;
      --bg2:      #16161e;
      --bg3:      #24283b;
      --border:   #2a2d3e;
      --text:     #c0caf5;
      --text-dim: #565f89;
      --bright:   #e0e0ff;
      --accent:   #7aa2f7;
      --green:    #9ece6a;
      --yellow:   #e0af68;
      --red:      #f7768e;
      --purple:   #bb9af7;
      --cyan:     #7dcfff;
    }

    html, body { height: 100%; font-family: 'Menlo', 'Consolas', 'Monaco', monospace; background: var(--bg); color: var(--text); font-size: 12px; line-height: 1.5; }

    #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ─────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0.03em; }

    #status { font-size: 11px; color: var(--text-dim); transition: color 0.3s; }
    #status.connected { color: var(--green); }

    /* ── Main layout ─────────────────────────── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Tree panel ──────────────────────────── */
    #tree-panel {
      width: var(--tree-width, 270px);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg2);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #tree { flex: 1; overflow-y: auto; padding: 4px 0; }

    /* ── Tree nodes ──────────────────────────── */
    .tree-node { cursor: pointer; user-select: none; }

    .tree-row {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 4px;
      margin: 1px 4px;
      transition: background 0.1s;
    }

    .tree-node:hover .tree-row { background: var(--bg3); }
    .tree-node.selected .tree-row { background: rgba(122, 162, 247, 0.18); }

    @keyframes flash { 0% { background: rgba(122,162,247,0.25); } 100% { background: transparent; } }
    .tree-node.flash .tree-row { animation: flash 0.6s ease-out; }

    .tree-toggle { color: var(--text-dim); width: 11px; flex-shrink: 0; font-size: 9px; }
    .tree-tag { color: var(--accent); font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .tree-badges { display: flex; gap: 3px; flex-shrink: 0; }
    .badge { padding: 1px 4px; border-radius: 3px; font-size: 9px; font-weight: 700; }
    .badge.keys  { background: rgba(122,162,247,0.12); color: var(--accent); }
    .badge.watch { background: rgba(224,175,104,0.12); color: var(--yellow); }
    .badge.comp  { background: rgba(187,154,247,0.12); color: var(--purple); }

    .tree-age { color: var(--text-dim); font-size: 9px; flex-shrink: 0; min-width: 26px; text-align: right; }

    /* ── Resize handle ───────────────────────── */
    #resize-handle {
      width: 4px;
      flex-shrink: 0;
      cursor: col-resize;
      background: transparent;
      transition: background 0.15s;
      position: relative;
      z-index: 1;
    }
    #resize-handle:hover, #resize-handle.dragging { background: var(--accent); }

    /* ── Detail panel ────────────────────────── */
    #detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #detail { flex: 1; overflow-y: auto; padding: 14px 18px; }

    /* ── Empty states ────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 10px; color: var(--text-dim); font-size: 13px; text-align: center;
    }
    .empty-icon { font-size: 36px; color: var(--border); line-height: 1; }
    .empty-state code { background: var(--bg3); padding: 3px 8px; border-radius: 4px; color: var(--accent); font-size: 12px; }

    /* ── Detail content ──────────────────────── */
    .detail-header {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .detail-tag { font-size: 17px; font-weight: 700; color: var(--accent); }
    .detail-id  { font-size: 10px; color: var(--text-dim); }

    .detail-meta { margin-bottom: 18px; display: flex; flex-direction: column; gap: 5px; }
    .meta-row   { display: flex; gap: 12px; }
    .meta-label { color: var(--text-dim); width: 90px; flex-shrink: 0; }
    .meta-val   { color: var(--text); }
    .meta-val.computed-list { color: var(--purple); font-style: italic; }

    .section-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-dim); margin-bottom: 8px;
    }

    /* ── Value tree ──────────────────────────── */
    .value-row { display: flex; align-items: baseline; gap: 5px; padding: 2px 0; }

    .value-key-row {
      display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 1px 0; border-radius: 3px;
    }
    .value-key-row:hover { color: var(--bright); }

    .value-toggle { color: var(--text-dim); width: 11px; flex-shrink: 0; font-size: 9px; }
    .value-key          { color: var(--cyan); }
    .value-key.computed { color: var(--purple); font-style: italic; }
    .value-key.watched  { text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }
    .value-key::after   { content: ':'; color: var(--text-dim); margin-left: 1px; }
    .arr-index          { color: var(--text-dim); }
    .arr-index::after   { content: ':'; }
    .value-type         { color: var(--text-dim); font-style: italic; }

    .val-str  { color: var(--green); }
    .val-num  { color: var(--yellow); }
    .val-bool { color: var(--purple); }
    .val-null { color: var(--text-dim); font-style: italic; }

    .value-more { color: var(--text-dim); font-style: italic; padding: 2px 0 2px 16px; }

    /* ── Scrollbars ──────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <span class="logo">◈ FlowState DevTools</span>
      <span id="status">○ Waiting for app…</span>
    </header>
    <div id="main">
      <div id="tree-panel">
        <div class="panel-header">
          <span>Instances</span>
          <span id="instance-count">0</span>
        </div>
        <div id="tree"></div>
      </div>
      <div id="resize-handle"></div>
      <div id="detail-panel">
        <div class="panel-header">Inspector</div>
        <div id="detail"></div>
      </div>
    </div>
  </div>
  <script src="./devtools.js" type="module"></script>
</body>
</html>
