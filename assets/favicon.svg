<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Root node -->
  <circle cx="100" cy="40" r="15" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  
  <!-- Connecting lines -->
  <line x1="100" y1="55" x2="60" y2="90" stroke="#27ae60" stroke-width="2"/>
  <line x1="100" y1="55" x2="100" y2="90" stroke="#27ae60" stroke-width="2"/>
  <line x1="100" y1="55" x2="140" y2="90" stroke="#27ae60" stroke-width="2"/>
  
  <!-- Second level nodes -->
  <circle cx="60" cy="100" r="12" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
  <circle cx="100" cy="100" r="12" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
  <circle cx="140" cy="100" r="12" fill="#1abc9c" stroke="#16a085" stroke-width="2"/>
  
  <!-- Third level connecting lines -->
  <line x1="60" y1="112" x2="40" y2="145" stroke="#16a085" stroke-width="2"/>
  <line x1="60" y1="112" x2="80" y2="145" stroke="#16a085" stroke-width="2"/>
  <line x1="140" y1="112" x2="140" y2="145" stroke="#16a085" stroke-width="2"/>
  
  <!-- Third level nodes -->
  <circle cx="40" cy="155" r="10" fill="#48c9b0" stroke="#36b399" stroke-width="2"/>
  <circle cx="80" cy="155" r="10" fill="#48c9b0" stroke="#36b399" stroke-width="2"/>
  <circle cx="140" cy="155" r="10" fill="#48c9b0" stroke="#36b399" stroke-width="2"/>
</svg>
