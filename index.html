<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test App</title>

  <!-- for App #2 -->
  <script type="importmap">
    {
      "imports": {
        "state.js": "./lib/state.js",
        "state_.js": "./lib/state_.js"
      }
    }
  </script>
  <script type="module">
    import './app.js';
  </script>
</head>

<body>
  <!-- App #1 -->
  <signal-app></signal-app>

  <br />
  <br />

  <!-- App #2 -->
  <script type="module">
    import { State } from "state.js";

    State.create('app2', {
      count: 0
    });

    document.getElementById('add-1-btn').addEventListener('click', (e) => {
      State.update(e.target, (prev) => {
        return {
          count: prev.count + 1
        };
      });
    });
  </script>

  <div id="app2">
    <span
      bind-state="count"
      to-prop="innerHTML"
    ></span>

    <span>
      <button id="add-1-btn">Add 1</button>
    </span>

    <script type="module">
      import { State } from "state.js";

      State.create('app2-clear-btn-span', {
        clearCount: 0,
        clearCountLabel: (state) => `Clear ${state.clearCount}`
      });

      document.getElementById('app2-clear-btn').addEventListener('click', (e) => {
        State.update(e.target, (prev) => ({
          count: 0,
          clearCount: prev.clearCount + 1
        }));
      });
    </script>

    <span id="app2-clear-btn-span">
      <button
        id="app2-clear-btn"
        bind-state="clearCountLabel"
        to-prop="innerHTML"
      >
        Clear
      </button>
    </span>

    <div id="top-half" bind-state="count" to-prop="innerHTML"></div>
    <div id="bottom-half"></div>
    <script type="module">
      import { State } from "state.js";
      State.watch('app2', 'count', (newValue) => {
        document.getElementById('bottom-half').textContent = newValue;
      });
    </script>
  </div>
</body>
</html>
